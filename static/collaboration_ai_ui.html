<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pale AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/default.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #f0fdfa; /* Tailwind teal-50 */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .session-button-active {
            background-color: #ccfbf1; /* Tailwind teal-100 */
            font-weight: 600;
            color: #0f766e; /* Tailwind teal-700 */
        }
        .session-button-active svg {
            color: #14b8a6; /* Tailwind teal-500 */
        }

        .qa-container {
            display: flex;
            align-items: flex-start;
            margin-top: 1rem; /* qa-container の上マージン調整 */
            margin-bottom: 1rem; /* qa-container の下マージン調整 */
            gap: 0.75rem; /* キャラと吹き出しの間隔を少し詰める */
        }
        .character-area {
            flex-shrink: 0;
            width: 40px; /* キャラクターアイコンを小さく */
            height: 40px;
            margin-top: 0.1rem; /* 吹き出しとの微調整 */
        }
        .character-image {
            max-width: 100%;
            max-height: 100%;
            border-radius: 9999px; /* 丸くクリップ */
            object-fit: cover; /* アイコンが見切れないように cover */
        }
        .speech-bubble-card {
            background-color: white;
            border-radius: 0.75rem; /* 吹き出しの角丸 */
            padding: 0.75rem 1rem; /* パディング調整 */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05); /*影を少し薄く*/
            position: relative;
            border-width: 1px; /* 枠線を1pxに */
            flex-grow: 1;
        }
        .speech-bubble-card.user-bubble {
            background-color: #e0f2fe; /* sky-100 */
            border-color: #7dd3fc; /* sky-300 */
        }
        .speech-bubble-card.ai-bubble {
            background-color: #f0fdfa; /* teal-50 */
            border-color: #5eead4; /* teal-300 */
        }

        /* ユーザー吹き出しのしっぽ */
        .speech-bubble-card.user-bubble::before {
            content: ""; position: absolute; top: 10px; left: auto; right: -8px;
            width: 0; height: 0; border-style: solid;
            border-width: 8px 0 8px 8px; /* サイズ調整 */
            border-color: transparent transparent transparent #7dd3fc; /* しっぽの色を枠線に合わせる */
        }
        .speech-bubble-card.user-bubble::after {
            content: ""; position: absolute; top: 11px; left: auto; right: -6px; /* 位置調整 */
            width: 0; height: 0; border-style: solid;
            border-width: 7px 0 7px 7px; /* サイズ調整 */
            border-color: transparent transparent transparent #e0f2fe;/* しっぽの色を背景に合わせる */
        }

        /* AI吹き出しのしっぽ */
        .speech-bubble-card.ai-bubble::before {
            content: ""; position: absolute; top: 10px; left: -8px; right: auto;
            width: 0; height: 0; border-style: solid;
            border-width: 8px 8px 8px 0;
            border-color: transparent #5eead4 transparent transparent;
        }
        .speech-bubble-card.ai-bubble::after {
            content: ""; position: absolute; top: 11px; left: -6px; right: auto;
            width: 0; height: 0; border-style: solid;
            border-width: 7px 7px 7px 0;
            border-color: transparent #f0fdfa transparent transparent;
        }

        .prose { font-size: 0.9rem; } /* prose全体を少し小さく */
        .prose pre { margin-top: 0.5em; margin-bottom: 0.5em; }
        .prose p { margin-top: 0.5em; margin-bottom: 0.5em; }
        .prose ul, .prose ol { margin-top: 0.5em; margin-bottom: 0.5em; }

        pre.code-block {
            position: relative;
            background-color: #f3f4f6;
            border: 1px solid #e5e7eb;
            padding: 0.75rem;
            border-radius: 0.25rem;
            margin-top: 0.75rem;
            margin-bottom: 0.75rem;
        }
        pre.code-block button.copy-btn {
            position: absolute;
            top: 0.25rem;
            right: 0.25rem;
            border: 1px solid #cbd5e1;
            background-color: #ffffff;
            font-size: 0.75rem;
            padding: 0.1rem 0.3rem;
            border-radius: 0.25rem;
            cursor: pointer;
        }

        .loader { border: 4px solid #ccfbf1; border-top: 4px solid #14b8a6; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* チャットリストのボタンコンテナ */
        .session-element {
            position: relative;
            padding-right: 2rem; /* アクション表示用の余白 */
        }
        .session-button-actions {
            display: none; /* 通常は非表示 */
            position: absolute;
            right: 0.25rem;
            top: 50%;
            transform: translateY(-50%);
            z-index: 20;
            background-color: rgba(255,255,255,0.9);
            padding-left: 0.25rem;
        }
        .session-element:hover .session-button-actions {
            display: flex; /* ホバー時に表示 */
        }
        .action-button {
            padding: 0.2rem;
            margin-left: 0.2rem;
            border-radius: 0.25rem;
        }
        .action-button:hover {
            background-color: #e0e7ff; /* indigo-100 or gray-200 */
        }
        .action-button.delete:hover {
            background-color: #fee2e2; /* red-100 */
            color: #ef4444; /* red-500 */
        }
        .folder-element.drop-target {
            background-color: #d1fae5; /* green-100 */
        }
        .session-element.dragging {
            opacity: 0.5;
        }
        .session-loading-spinner {
            border: 2px solid #5eead4;
            border-top-color: transparent;
            border-radius: 50%;
            width: 12px;
            height: 12px;
            animation: spin 1s linear infinite;
            margin-left: 4px;
        }
        .session-title-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #sessionHeader span,
        #sessionHeader button {
            white-space: nowrap;
        }
        #chatSessionList {
            scrollbar-width: thin;
            max-height: calc(100vh - 380px);
            overflow-y: auto;
            box-sizing: border-box;
        }
        .sidebar-label {
            white-space: nowrap;
        }
        /* Markdown table styling */
        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
        }
        .markdown-body th, .markdown-body td {
            border: 1px solid #ccc;
            padding: 0.4rem;
        }
        .markdown-body tr:nth-child(even) {
            background-color: #f9fafb;
        }
        #loadingIndicator {
            pointer-events: none;
        }
        #sidebar.collapsed {
            width: 3rem;
            padding-left: 0.5rem;
            padding-right: 0.5rem;
        }
        #sidebar.collapsed #sidebarContent {
            display: none;
        }
        #sidebar.collapsed #sidebarLogoText {
            display: none;
        }
        #sidebar.collapsed #sidebarLogoImage {
            display: none;
        }
        #sidebar.collapsed #sidebarTopLink {
            display: none;
        }
        @media (max-width: 640px) {
            .markdown-body table {
                display: block;
                overflow-x: auto;
            }
        }
        /* ... 既存のスタイル ... */
    .search-fragments-container {
        border: 1px solid #d1d5db; /* Tailwind gray-300 */
        border-radius: 0.5rem; /* Tailwind rounded-lg */
        padding: 0.75rem; /* Tailwind p-3 */
        margin-top: 0.75rem; /* Tailwind mt-3 */
        background-color: #f9fafb; /* Tailwind gray-50 */
    }
    .search-fragments-container h4 { /* 断片リストのタイトル */
        font-size: 0.875rem; /* Tailwind text-sm */
        font-weight: 600; /* Tailwind font-semibold */
        color: #1f2937; /* Tailwind gray-800 */
        margin-bottom: 0.5rem; /* Tailwind mb-2 */
    }
    .search-fragment-item {
        border-bottom: 1px dashed #e5e7eb; /* Tailwind gray-200 */
        padding-bottom: 0.75rem; /* Tailwind pb-3 */
        margin-bottom: 0.75rem; /* Tailwind mb-3 */
    }
    .search-fragment-item:last-child {
        border-bottom: none;
        margin-bottom: 0;
        padding-bottom: 0;
    }
    .fragment-source-header { /* 各断片のソース名など */
        font-weight: 600; /* Tailwind font-semibold */
        color: #059669; /* Tailwind emerald-600 */
        font-size: 0.8rem; /* 少し小さめ */
        margin-bottom: 0.25rem; /* Tailwind mb-1 */
    }
    .fragment-meta-info { /* URL、日付、著者など */
        font-size: 0.7rem; /* さらに小さく */
        color: #4b5563; /* Tailwind gray-600 */
        margin-left: 0.5rem; /* Tailwind ml-2 */
        line-height: 1.4;
    }
    .fragment-meta-info a {
        color: #2563eb; /* Tailwind blue-600 */
        word-break: break-all;
    }
    .search-summary-container {
        border: 1px solid #60a5fa; /* Tailwind blue-400 */
        border-radius: 0.5rem; /* Tailwind rounded-lg */
        padding: 0.75rem; /* Tailwind p-3 */
        margin-top: 1rem; /* Tailwind mt-4 */
        background-color: #eff6ff; /* Tailwind blue-50 */
    }
    .search-summary-title {
        font-weight: bold;
        color: #1d4ed8; /* Tailwind blue-700 */
        margin-bottom: 0.25rem; /* Tailwind mb-1 */
        font-size: 0.875rem; /* Tailwind text-sm */
    }
    .search-warnings-container {
        border: 1px solid #facc15; /* Tailwind yellow-400 */
        border-radius: 0.5rem;
        padding: 0.75rem;
        margin-top: 1rem;
        background-color: #fefce8; /* Tailwind yellow-50 */
        font-size: 0.75rem; /* Tailwind text-xs */
    }
    .search-warnings-title {
        font-weight: bold;
        color: #a16207; /* Tailwind yellow-700 */
        margin-bottom: 0.25rem;
    }

    .toggle-fragments-btn {
        background-color: #e0f2fe; /* Tailwind sky-100 */
        color: #0ea5e9; /* Tailwind sky-600 */
        padding: 0.25rem 0.5rem; /* Tailwind px-2 py-1 */
        font-size: 0.75rem; /* Tailwind text-xs */
        border-radius: 0.25rem; /* Tailwind rounded */
        cursor: pointer;
        border: 1px solid #7dd3fc; /* Tailwind sky-300 */
        margin-bottom: 0.5rem; /* Tailwind mb-2 */
        display: block; /* 必要に応じて */
    }
    .fragments-list-collapsible {
        max-height: 300px; /* 初期表示の高さ制限 */
        overflow-y: auto;   /* スクロール可能に */
        transition: max-height 0.3s ease-in-out;
        border-top: 1px solid #e5e7eb; /* Tailwind gray-200 */
        padding-top: 0.5rem; /* Tailwind pt-2 */
    }
    .fragments-list-collapsible.expanded {
        max-height: 1000px; /* 十分な高さ、必要なら調整 */
    }
    </style>
</head>
<body class="flex h-screen antialiased text-gray-800 bg-slate-100">
    <div class="flex flex-row h-full w-full overflow-x-hidden">

        <div id="sidebar" class="flex flex-col py-8 pl-6 pr-2 w-80 bg-white flex-shrink-0 shadow-lg h-full transition-all duration-300 overflow-x-hidden">
            <div class="flex flex-row items-center justify-between h-12 w-full" id="sidebarTop">
                <div class="flex items-center">
                    <img id="sidebarLogoImage" src="/static/pic/Default.png" alt="Pale AI Logo" class="h-10 w-auto mr-2" onerror="this.style.display='none';">
                    <div id="sidebarLogoText" class="font-bold text-2xl text-teal-700">Pale AI</div>
                </div>
                <div id="sidebarToggleWrapper" class="flex flex-col items-center text-teal-700">
                    <button id="sidebarToggle" class="text-xl focus:outline-none">&#9664;</button>
                    <span id="sidebarToggleLabel" class="text-xs">Close</span>
                </div>
            </div>
            <div class="text-center mt-2">
                <a href="#" id="sidebarTopLink" class="text-teal-600 underline text-sm">Top</a>
            </div>
            <div id="sidebarContent">

            <div id="userInfoArea" class="flex flex-col items-center border border-gray-200 mt-4 w-full py-6 px-4 rounded-lg hidden">
                <div class="h-16 w-16 rounded-full border overflow-hidden bg-gray-200 flex items-center justify-center text-gray-500 text-2xl" id="userAvatar">?</div>
                <div class="text-sm font-semibold mt-2" id="userNameDisplay">未ログイン</div>
                <button id="logoutButton" class="mt-3 text-xs bg-red-500 hover:bg-red-600 text-white py-1 px-3 rounded-md">ログアウト</button>
            </div>
            <div id="loginFormArea" class="mt-4 p-4 border border-gray-200 rounded-lg">
                <h3 class="text-sm font-semibold mb-2 text-gray-700">ログイン</h3>
                <input type="text" id="loginEmail" placeholder="メールアドレスまたはユーザー名" class="w-full p-2 border border-gray-300 rounded-md mb-2 text-sm">
                <input type="password" id="loginPassword" placeholder="パスワード" class="w-full p-2 border border-gray-300 rounded-md mb-2 text-sm">
                <button id="loginButton" class="w-full bg-teal-500 hover:bg-teal-600 text-white py-2 px-4 rounded-md text-sm">ログイン</button>
                <p class="text-xs text-center mt-2">アカウントがない場合は<a href="#" id="showRegisterLink" class="text-teal-600 hover:underline">登録</a></p>
            </div>
            <div id="registerFormArea" class="hidden mt-4 p-4 border border-gray-200 rounded-lg">
                <h3 class="text-sm font-semibold mb-2 text-gray-700">新規登録</h3>
                <input type="text" id="registerUsername" placeholder="ユーザー名 (4-20文字)" class="w-full p-2 border border-gray-300 rounded-md mb-2 text-sm">
                <input type="email" id="registerEmail" placeholder="メールアドレス" class="w-full p-2 border border-gray-300 rounded-md mb-2 text-sm">
                <input type="password" id="registerPassword" placeholder="パスワード" class="w-full p-2 border border-gray-300 rounded-md mb-2 text-sm">
                <div class="flex items-center space-x-2 mb-2 text-sm">
                    <label><input type="radio" name="gender" value="男性" checked> 男性</label>
                    <label><input type="radio" name="gender" value="女性"> 女性</label>
                    <label><input type="radio" name="gender" value="その他"> その他</label>
                </div>
                <div class="flex items-center justify-center space-x-2 mb-1 text-sm">
                    <input type="color" id="color1" value="#ff0000" class="w-10 h-8 p-0 border rounded-md">
                    <input type="color" id="color2" value="#0000ff" class="w-10 h-8 p-0 border rounded-md">
                </div>
                <p class="text-xs text-center mb-2">好きな色を2色選択してください</p>
                <button id="registerButton" class="w-full bg-sky-500 hover:bg-sky-600 text-white py-2 px-4 rounded-md text-sm">登録する</button>
                <p class="text-xs text-center mt-2">既にアカウントをお持ちの場合は<a href="#" id="showLoginLink" class="text-teal-600 hover:underline">ログイン</a></p>
            </div>
            <div id="registerProgress" class="hidden mt-4 p-4 border border-gray-200 rounded-lg text-center">
                <p class="text-lg font-semibold mb-2">しばらくお待ちください...</p>
                <div class="border-4 border-t-4 border-gray-200 rounded-full w-8 h-8 mx-auto animate-spin"></div>
            </div>
            <div id="registerSuccess" class="hidden mt-4 p-4 border border-gray-200 rounded-lg text-center">
                <p class="text-lg font-semibold mb-2">登録成功！あなたのメタモンキーが生成されました！</p>
                <img id="registerSuccessImage" src="" alt="profile" class="mx-auto mb-2 w-32 h-32 object-contain">
                <button id="registerSuccessLogin" class="bg-teal-500 hover:bg-teal-600 text-white py-2 px-4 rounded-md">早速ログインする</button>
            </div>

            <div id="globalSearchWrapper" class="mt-4 hidden">
                <input id="globalSearch" type="text" placeholder="会話を検索" class="w-full p-1 border rounded-md text-xs" />
                <div id="globalSearchResults" class="mt-2 text-xs max-h-40 overflow-y-auto"></div>
            </div>

            <div id="folderSection" class="flex flex-col mt-8 hidden">
                <div class="flex flex-row items-center justify-between text-xs">
                    <span class="font-bold text-gray-600">フォルダ</span>
                    <div class="flex items-center space-x-1">
                        <button id="newFolderButton" class="flex items-center justify-center bg-teal-400 hover:bg-teal-500 text-white h-6 w-6 rounded-full" title="新しいフォルダを作成">+</button>
                        <span class="text-teal-600 hidden sm:inline">新しいフォルダを作る</span>
                    </div>
                </div>
                <div id="folderList" class="flex flex-col space-y-1 mt-2 -mx-2"></div>
            </div>

            <div id="sessionSection" class="flex flex-col mt-8 hidden flex-1 min-h-0">
                <div id="sessionHeader" class="flex flex-row items-center justify-between text-xs flex-nowrap">
                    <span class="font-bold text-gray-600 sidebar-label">チャット一覧</span>
                    <div class="flex items-center space-x-1">
                        <button id="newChatButton" class="flex items-center justify-center bg-teal-400 hover:bg-teal-500 text-white h-6 w-6 rounded-full" title="新しいチャットを開始">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                        </button>
                        <span class="text-teal-600 sidebar-label">新しく会話を始める</span>
                        <button id="memoryManageButton" class="ml-2 text-teal-600 underline text-xs sidebar-label">メモリ管理</button>
                    </div>
                </div>
                <div id="chatSessionList" class="flex flex-col space-y-1 mt-4 -mx-2 pr-2 flex-1 min-h-0 overflow-y-auto">
                </div>
            </div>
            </div>
        </div>

        <div id="chatArea" class="flex flex-col flex-auto h-full p-6 hidden">
            <div class="flex flex-col flex-auto flex-shrink-0 rounded-2xl bg-white h-full p-4 shadow-md relative">
                <div class="flex items-center mb-2">
                    <input id="chatSearch" type="text" placeholder="チャット内検索" class="flex-grow p-1 border rounded-md text-xs hidden" />
                    <button id="cloneSessionBtn" class="ml-2 bg-sky-400 hover:bg-sky-500 text-white px-2 py-1 rounded text-xs hidden" title="チャット内容を次のチャットに引き継ぐ">引き継ぎ</button>
                </div>
                <div id="chatMessagesContainer" class="flex flex-col h-full overflow-y-auto mb-4">
                </div>

                <div id="loadingIndicator" class="hidden absolute inset-0 bg-white bg-opacity-70 flex flex-col items-center justify-center">
                    <div class="loader"></div>
                    <p class="text-teal-700 text-sm mt-2">思考中...</p>
                    <video id="thinkingVideo" class="hidden mt-2 mx-auto" style="max-width:180px;" autoplay loop muted playsinline></video>
                </div>

                <div id="videoModeContainer" class="hidden flex flex-col p-3 border rounded bg-gray-100 mb-2 space-y-2">
                    <textarea id="videoDescription" rows="3" class="w-full p-1 border rounded text-sm" placeholder="動画にしたい内容/ストーリー/シーン分割"></textarea>
                    <div class="flex flex-wrap items-center gap-2 text-xs">
                        <label>長さ <input id="videoDuration" type="number" value="10" min="1" max="300" class="p-1 border rounded w-20"></label>
                        <label>解像度 <select id="videoResolution" class="p-1 border rounded">
                            <option value="512x512">512p</option>
                            <option value="1280x720">720p</option>
                            <option value="1920x1080">1080p</option>
                            <option value="3840x2160">4K</option>
                        </select></label>
                        <label class="flex items-center"><input type="checkbox" id="videoBgm" class="mr-1" checked> BGM</label>
                        <input id="videoBgmMood" type="text" placeholder="BGMムード" class="p-1 border rounded w-24">
                        <label class="flex items-center"><input type="checkbox" id="videoNarration" class="mr-1" checked> ナレーション</label>
                        <select id="videoNarrationLang" class="p-1 border rounded">
                            <option value="JA" selected>日本語</option>
                            <option value="EN">English</option>
                        </select>
                        <label class="flex items-center"><input type="checkbox" id="videoSubtitles" class="mr-1" checked> 字幕</label>
                    </div>
                    <div>
                        <button id="videoGenerateBtn" class="bg-teal-500 hover:bg-teal-600 text-white px-4 py-2 rounded text-sm">ペイルの像(動画生成モード)</button>
                    </div>
                    <div id="videoProgress" class="w-full bg-gray-200 rounded h-2 hidden">
                        <div id="videoProgressBar" class="bg-teal-500 h-2 rounded" style="width:0%"></div>
                    </div>
                    <video id="videoPreview" class="hidden mt-2 max-w-full" controls></video>
                    <a id="videoDownloadLink" class="hidden text-teal-600 underline text-xs mt-1" download>ダウンロード</a>
                </div>

                <div id="talkModeContainer" class="hidden flex flex-col p-3 border rounded bg-gray-100 mb-2 space-y-2">
                    <div class="flex flex-wrap items-center gap-2 text-xs mb-1">
                        <label>入力
                            <select id="talkInputLang" class="p-1 border rounded"></select>
                        </label>
                        <label>出力
                            <select id="talkOutputLang" class="p-1 border rounded"></select>
                        </label>
                        <label class="flex items-center"><input type="radio" name="talkInputMode" value="text" checked class="mr-1">テキスト</label>
                        <label class="flex items-center"><input type="radio" name="talkInputMode" value="mic" class="mr-1">マイク</label>
                    </div>
                    <textarea id="talkInputText" rows="2" class="w-full p-1 border rounded text-sm" placeholder="話す内容を入力..."></textarea>
                    <button id="talkRecordBtn" class="hidden bg-teal-500 hover:bg-teal-600 text-white px-2 py-1 rounded text-sm">録音</button>
                    <div>
                        <button id="talkSendBtn" class="bg-teal-500 hover:bg-teal-600 text-white px-4 py-2 rounded text-sm">トーク送信</button>
                    </div>
                    <video id="talkVideo" class="hidden mt-2 max-w-full" controls></video>

    // --- 認証付きAPIリクエストヘルパー ---
    async function makeAuthenticatedRequest(url, options = {}) {
        const token = getToken();
        const headers = { ...options.headers };
        if (!(options.body instanceof FormData) && !headers['Content-Type']) {
            headers['Content-Type'] = 'application/json';
        }
        if (!headers['accept']) {
            headers['accept'] = 'application/json';
        }
        if (token) {
            headers['Authorization'] = `Bearer ${token}`;
        }
        if (options.body instanceof FormData) { // FormDataの場合はContent-Typeをブラウザに任せる
            delete headers['Content-Type'];
        }
        try {
            const response = await fetch(url, { ...options, headers });
            if (response.status === 401) { // Unauthorized
                console.warn('Unauthorized. Logging out.');
                handleLogout();
                alert('認証が切れています。再度ログインしてください。');
                throw new Error('auth');
            }
            if (response.status >= 500) {
                alert('サーバー内部でエラーが発生しました。時間を置いて再度お試しください。');
            }
            return response;
        } catch (error) {
            console.error(`API request to ${url} failed:`, error);
            // ネットワークエラーなどの場合もここでキャッチ
            throw error; // エラーを再スローして呼び出し元で処理できるようにする
        }
    }

            if (loginFormArea) loginFormArea.classList.remove('hidden');
            if (registerFormArea) registerFormArea.classList.add('hidden');
        }
    }

    // --- 空のチャット画面表示用関数 ---
function resetChatUI() {
        if (!chatArea || !chatMessagesContainer) return;
        hideThinkingVideo();
        if (loadingIndicator) loadingIndicator.classList.add('hidden');
        currentSessionId = null;
        chatMessagesContainer.innerHTML = '';
        chatArea.classList.remove('hidden');
        if (chatSessionListDiv) {
            const activeBtns = chatSessionListDiv.querySelectorAll('.session-button-active');
            activeBtns.forEach(btn => btn.classList.remove('session-button-active'));
        }
        displayMessage('新しいチャットが開始されました。メッセージをどうぞ。', 'system');
    }

    // --- メッセージ表示関数 ---
    function displayMessage(content, role, aiModelName = null, messageId = null, searchFragments = null, searchSummary = null, searchModeWarnings = null) {
        if (!chatMessagesContainer) return;
        const messageWrapper = document.createElement('div');
        messageWrapper.classList.add('qa-container'); // 簡略化
        if (messageId) messageWrapper.setAttribute('data-message-id', messageId);

        const characterArea = document.createElement('div');
        characterArea.classList.add('character-area');
        const characterImage = document.createElement('img');
        characterImage.classList.add('character-image');

        const speechBubbleCard = document.createElement('div');
        speechBubbleCard.classList.add('speech-bubble-card');

        if (role === 'user') {
            messageWrapper.classList.add('justify-end', 'flex-row-reverse');
            characterImage.src = currentUserProfileImage || '/static/pic/Default.png';
            characterImage.alt = 'User';
            speechBubbleCard.classList.add('user-bubble');
        } else if (role === 'ai') {
            characterImage.src = '/static/pic/Ukiyozaru.png';
            characterImage.alt = 'AI';
            speechBubbleCard.classList.add('ai-bubble');
            if (aiModelName) {
                const modelLabel = document.createElement('div');
                modelLabel.className = 'text-[10px] text-gray-500 absolute -top-2 right-1';
                modelLabel.textContent = aiModelName;
                speechBubbleCard.appendChild(modelLabel);
            }
        } else {
            const systemDiv = document.createElement('div');
            systemDiv.classList.add('text-xs', 'text-gray-500', 'italic', 'text-center', 'my-2', 'w-full', 'py-1', 'px-3', 'bg-gray-100', 'rounded');
            systemDiv.innerHTML = marked.parse(content);
            chatMessagesContainer.appendChild(systemDiv);
            chatMessagesContainer.scrollTop = chatMessagesContainer.scrollHeight;
            return;
        }

        const contentDiv = document.createElement('div');
        contentDiv.classList.add('prose', 'prose-sm', 'max-w-none', 'markdown-body');

        const currentSelectedMode = aiModeSelect.value;
        if ((currentSelectedMode === 'search3' || currentSelectedMode === 'search6' || currentSelectedMode === 'search' || currentSelectedMode === 'supersearch') && role === 'ai') {
            if (content) {
                contentDiv.innerHTML = marked.parse(content);
                addCopyButtons(contentDiv);
                contentDiv.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
            } else {
                contentDiv.innerHTML = marked.parse('*検索結果の主要コンテンツがありませんでした。*');
            }
            speechBubbleCard.appendChild(contentDiv);

            if (searchFragments && Array.isArray(searchFragments) && searchFragments.length > 0) {
                const fragmentsWrapper = document.createElement('div');
                fragmentsWrapper.className = 'search-fragments-container';
                const listTitle = document.createElement('h4');
                listTitle.textContent = '収集された情報源リスト（詳細）';
                fragmentsWrapper.appendChild(listTitle);

                const toggleBtn = document.createElement('button');
                toggleBtn.textContent = '詳細を表示する';
                toggleBtn.className = 'toggle-fragments-btn';
                const fragmentsListDiv = document.createElement('div');
                fragmentsListDiv.className = 'fragments-list-collapsible';
                toggleBtn.onclick = () => {
                    fragmentsListDiv.classList.toggle('expanded');
                    toggleBtn.textContent = fragmentsListDiv.classList.contains('expanded') ? '詳細を隠す' : '詳細を表示する';
                };
                fragmentsWrapper.appendChild(toggleBtn);

                searchFragments.forEach(fragment => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'search-fragment-item';

                    let itemHtml = `<div class="fragment-source-header">${fragment.source || '不明なソース'}</div>`;
                    const metaDetails = [];
                    if (fragment.query) metaDetails.push(`<strong>クエリ:</strong> ${fragment.query}`);
                    if (fragment.intent) metaDetails.push(`<strong>意図/種類:</strong> ${fragment.intent}`);
                    if (fragment.source_url) metaDetails.push(`<strong>URL:</strong> <a href="${fragment.source_url}" target="_blank">${fragment.source_url}</a>`);
                    if (fragment.published_date) metaDetails.push(`<strong>発行日:</strong> ${fragment.published_date}`);
                    if (fragment.author) metaDetails.push(`<strong>著者/発信者:</strong> ${fragment.author}`);
                    if (fragment.content_type) metaDetails.push(`<strong>コンテンツ種類:</strong> ${fragment.content_type}`);
                    if (fragment.reliability_label) metaDetails.push(`<strong>信頼性(AI評価):</strong> ${fragment.reliability_label}`);
                    if (fragment.bias_label) metaDetails.push(`<strong>バイアス(AI評価):</strong> ${fragment.bias_label}`);
                    if (fragment.issues_detected && fragment.issues_detected.length > 0) {
                        metaDetails.push(`<strong>指摘事項(AI評価):</strong> ${fragment.issues_detected.join(', ')}`);
                    }
                    if (metaDetails.length > 0) {
                        itemHtml += `<div class="fragment-meta-info">${metaDetails.join('<br>')}</div>`;
                    }

                    const fragResponseDiv = document.createElement('div');
                    fragResponseDiv.className = 'prose prose-xs max-w-none markdown-body text-gray-700 mt-1';
                    fragResponseDiv.innerHTML = marked.parse(fragment.response || fragment.error || '<i>内容なし</i>');
                    addCopyButtons(fragResponseDiv);
                    fragResponseDiv.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));

                    itemHtml += fragResponseDiv.outerHTML;

                    if (fragment.links && fragment.links.length > 0 && (!fragment.source_url || !fragment.links.includes(fragment.source_url))) {
                        itemHtml += `<div class="fragment-meta-info mt-1"><strong>その他関連リンク:</strong><br>${fragment.links.map(l => `<a href="${l}" target="_blank">${l}</a>`).join('<br>')}</div>`;
                    }

                    itemDiv.innerHTML = itemHtml;
                    fragmentsListDiv.appendChild(itemDiv);
                });
                fragmentsWrapper.appendChild(fragmentsListDiv);
                speechBubbleCard.appendChild(fragmentsWrapper);
            }

            if (searchSummary) {
                const summaryContainer = document.createElement('div');
                summaryContainer.className = 'search-summary-container';
                summaryContainer.innerHTML = `<div class="search-summary-title">【最終まとめ】</div>` + marked.parse(searchSummary);
                speechBubbleCard.appendChild(summaryContainer);
            }

            if (searchModeWarnings && Object.keys(searchModeWarnings).length > 0) {
                const warningsContainer = document.createElement('div');
                warningsContainer.className = 'search-warnings-container';
                warningsContainer.innerHTML = `<div class="search-warnings-title">【信頼性・バイアスに関する留意点（AIによる自動分析）】</div>`;
                for (const key in searchModeWarnings) {
                    if (Array.isArray(searchModeWarnings[key]) && searchModeWarnings[key].length > 0) {
                        warningsContainer.innerHTML += `<p><strong>${key}:</strong><ul>${searchModeWarnings[key].map(item => `<li>${item}</li>`).join('')}</ul></p>`;
                    } else if (typeof searchModeWarnings[key] === 'string' && searchModeWarnings[key]) {
                        warningsContainer.innerHTML += `<p><strong>${key}:</strong> ${searchModeWarnings[key]}</p>`;
                    }
                }
                speechBubbleCard.appendChild(warningsContainer);
            }
        } else {
            contentDiv.innerHTML = marked.parse(content);
            addCopyButtons(contentDiv);
            speechBubbleCard.appendChild(contentDiv);
            if (role === 'ai' && typeof hljs !== 'undefined') {
                contentDiv.querySelectorAll('pre code').forEach(block => {
                    hljs.highlightElement(block);
                });
            }
        }

        const inCodeMode = aiModeSelect && aiModeSelect.value === 'code';
        if (role === 'ai' && inCodeMode) {
            const blocks = contentDiv.querySelectorAll('pre > code');
            if (blocks.length > 0) {
                blocks.forEach(code => {
                    code.textContent = code.textContent.replace(/ウキヨザル|おともだち|ウッキー/g, '');
                    const pre = code.parentElement;
                    if (!pre.previousElementSibling || !pre.previousElementSibling.classList.contains('code-intro')) {
                        const intro = document.createElement('div');
                        intro.className = 'text-xs font-semibold mb-1 code-intro';
                        intro.textContent = 'このコードをコピペして使ってください';
                        pre.parentNode.insertBefore(intro, pre);
                    }
                    if (!pre.nextElementSibling || !pre.nextElementSibling.classList.contains('code-hint')) {
                        const hint = document.createElement('div');
                        hint.className = 'bg-yellow-50 border-l-4 border-yellow-300 p-2 my-2 text-sm code-hint';
                        hint.innerHTML = '<strong>ヒント</strong>: 生成されたコードは実行前に確認してください。';
                        pre.parentNode.insertBefore(hint, pre.nextSibling);
                    }
                });
                if (typeof hljs !== 'undefined') {
                    blocks.forEach(b => hljs.highlightElement(b));
                }
                addCopyButtons(contentDiv);
            }
        }

        if (role === 'ai' && !(currentSelectedMode === 'search3' || currentSelectedMode === 'search6' || currentSelectedMode === 'search' || currentSelectedMode === 'supersearch')) {
            const transBtn = document.createElement('button');
            transBtn.className = 'text-xs text-blue-600 underline mt-2';
            transBtn.textContent = 'この返答をDeepLで翻訳';
            const transDiv = document.createElement('div');
            transDiv.className = 'text-xs text-gray-600 mt-1';
            transBtn.addEventListener('click', async () => {
                transDiv.textContent = '翻訳中...';
                try {
                    const res = await makeAuthenticatedRequest(API_ENDPOINT_TRANSLATE, {
                        method: 'POST',
                        body: JSON.stringify({ text: contentDiv.textContent, target_lang: 'JA' })
                    });
                    if (res.ok) { const data = await res.json(); transDiv.textContent = data.translated_text; } else { transDiv.textContent = '翻訳失敗'; }
                } catch (e) { transDiv.textContent = '翻訳エラー'; }
            });
            speechBubbleCard.appendChild(transBtn);
            speechBubbleCard.appendChild(transDiv);
            if (autoTranslateCheckbox && autoTranslateCheckbox.checked) transBtn.click();
        }
        if (role === 'user' && autoTranslateCheckbox && autoTranslateCheckbox.checked) {
            const userTransDiv = document.createElement('div');
            userTransDiv.className = 'text-xs text-gray-600 mt-1';
            speechBubbleCard.appendChild(userTransDiv);
            (async () => {
                userTransDiv.textContent = '翻訳中...';
                try {
                    const r = await makeAuthenticatedRequest(API_ENDPOINT_TRANSLATE, {
                        method: 'POST',
                        body: JSON.stringify({ text: contentDiv.textContent, target_lang: 'JA' })
                    });
                    if (r.ok) { const d = await r.json(); userTransDiv.textContent = d.translated_text; } else { userTransDiv.textContent = '翻訳失敗'; }
                } catch (e) { userTransDiv.textContent = '翻訳エラー'; }
            })();
        }

        speechBubbleCard.appendChild(contentDiv);
        characterArea.appendChild(characterImage);
        messageWrapper.appendChild(characterArea);
        messageWrapper.appendChild(speechBubbleCard);
        chatMessagesContainer.appendChild(messageWrapper);
        chatMessagesContainer.scrollTop = chatMessagesContainer.scrollHeight;

    }


    // --- フォルダ一覧表示関連 ---
    async function loadFolders() {
        if (!getToken()) {
            if (folderListDiv) folderListDiv.innerHTML = '<p class="text-xs text-gray-500 px-2">ログインしてください</p>';
            return;
        }
        if (!folderListDiv) return;
        folderListDiv.innerHTML = '<p class="text-xs text-gray-500 px-2">読込中...</p>';
        try {
            const res = await makeAuthenticatedRequest(API_ENDPOINT_FOLDERS, { method: 'GET' });
            if (!res.ok) {
                const err = await res.json().catch(() => ({ detail: 'フォルダ一覧の取得失敗' }));
                throw new Error(err.detail);
            }
            const folders = await res.json();
            foldersCache = folders;
            folderListDiv.innerHTML = '';
            const allDiv = document.createElement('div');
            allDiv.className = 'folder-element flex items-center w-full hover:bg-teal-50 rounded-md group';
            allDiv.addEventListener('dragover', (e) => { e.preventDefault(); allDiv.classList.add('drop-target'); });
            allDiv.addEventListener('dragleave', () => { allDiv.classList.remove('drop-target'); });
            allDiv.addEventListener('drop', (e) => {
                e.preventDefault();
                allDiv.classList.remove('drop-target');
                const sid = e.dataTransfer.getData('text/plain');
                if (sid) moveSessionToFolder(sid, 0);
            });
            const allBtn = document.createElement('button');
            allBtn.className = 'flex-grow px-3 py-1 text-sm text-left text-gray-700 focus:outline-none';
            allBtn.textContent = 'すべて';
            allBtn.addEventListener('click', () => handleFolderSelection(0));
            allDiv.appendChild(allBtn);
            folderListDiv.appendChild(allDiv);

            const unassignedDiv = document.createElement('div');
            unassignedDiv.className = 'folder-element flex items-center w-full hover:bg-teal-50 rounded-md group';
            unassignedDiv.addEventListener('dragover', (e) => { e.preventDefault(); unassignedDiv.classList.add('drop-target'); });
            unassignedDiv.addEventListener('dragleave', () => { unassignedDiv.classList.remove('drop-target'); });
            unassignedDiv.addEventListener('drop', (e) => {
                e.preventDefault();
                unassignedDiv.classList.remove('drop-target');
                const sid = e.dataTransfer.getData('text/plain');
                if (sid) moveSessionToFolder(sid, 0);
            });
            const noneBtn = document.createElement('button');
            noneBtn.className = 'flex-grow px-3 py-1 text-sm text-left text-gray-700 focus:outline-none';
            noneBtn.textContent = '未分類';
            noneBtn.addEventListener('click', () => handleFolderSelection(-1));
            unassignedDiv.appendChild(noneBtn);
            folderListDiv.appendChild(unassignedDiv);

            folders.forEach(folder => {
                const container = document.createElement('div');
                container.className = 'folder-element flex items-center w-full hover:bg-teal-50 rounded-md group';
                container.dataset.folderId = folder.id;
                container.addEventListener('dragover', (e) => { e.preventDefault(); container.classList.add('drop-target'); });
                container.addEventListener('dragleave', () => { container.classList.remove('drop-target'); });
                container.addEventListener('drop', (e) => {
                    e.preventDefault();
                    container.classList.remove('drop-target');
                    const sid = e.dataTransfer.getData('text/plain');
                    if (sid) moveSessionToFolder(sid, folder.id);
                });
                const btn = document.createElement('button');
                btn.className = 'flex-grow px-3 py-1 text-sm text-left text-gray-700 focus:outline-none';
                btn.textContent = folder.name;
                btn.addEventListener('click', () => handleFolderSelection(folder.id));
                const actions = document.createElement('div');
                actions.className = 'folder-button-actions flex items-center pr-2';
                const editBtn = document.createElement('button');
                editBtn.className = 'edit-folder-btn action-button text-gray-500 hover:text-blue-600';
                editBtn.textContent = '✏';
                editBtn.title = '名称変更';
                editBtn.addEventListener('click', (e) => { e.stopPropagation(); handleEditFolder(folder.id, folder.name); });
                const delBtn = document.createElement('button');
                delBtn.className = 'delete-folder-btn action-button text-gray-500 hover:text-red-600 delete';
                delBtn.textContent = '🗑';
                delBtn.title = '削除';
                delBtn.addEventListener('click', (e) => { e.stopPropagation(); handleDeleteFolder(folder.id, folder.name); });
                actions.appendChild(editBtn);
                actions.appendChild(delBtn);
                container.appendChild(btn);
                container.appendChild(actions);
                folderListDiv.appendChild(container);
            });
        } catch (error) {
            console.error('フォルダ一覧読込エラー:', error);
            if (error.message !== 'auth') {
                folderListDiv.innerHTML = `<p class="text-xs text-red-500 px-2">読み込み失敗</p>`;
            }
        }
    }

    async function handleEditFolder(folderId, currentName) {
        const newName = prompt('新しいフォルダ名を入力してください:', currentName);
        if (newName && newName.trim() !== '' && newName !== currentName) {
            try {
                const res = await makeAuthenticatedRequest(`${API_ENDPOINT_FOLDERS}/${folderId}`, {
                    method: 'PUT',
                    body: JSON.stringify({ name: newName.trim() })
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({ detail: '更新失敗' }));
                    throw new Error(err.detail);
                }
                await loadFolders();
            } catch (error) {
                if (error.message !== 'auth') {
                    alert(`フォルダ更新エラー: ${error.message}`);
                }
            }
        }
    }

    async function handleDeleteFolder(folderId, folderName) {
        if (confirm(`フォルダ「${folderName}」を削除しますか？`)) {
            try {
                const res = await makeAuthenticatedRequest(`${API_ENDPOINT_FOLDERS}/${folderId}`, { method: 'DELETE' });
                if (res.status === 204 || res.ok) {
                    await loadFolders();
                    await loadChatSessions();
                } else {
                    const err = await res.json().catch(() => ({ detail: '削除失敗' }));
                    throw new Error(err.detail);
                }
            } catch (error) {
                if (error.message !== 'auth') {
                    alert(`フォルダ削除エラー: ${error.message}`);
                }
            }
        }
    }

    function handleFolderSelection(folderId) {
        currentFolderId = folderId;
        loadChatSessions();
    }

    if (globalSearchInput) {
        globalSearchInput.addEventListener('input', async () => {
            const q = globalSearchInput.value.trim();
            if (q.length < 2) { if(globalSearchResults) globalSearchResults.innerHTML=''; return; }
            try {
                const res = await makeAuthenticatedRequest(`${API_BASE_URL}/chat/search?q=${encodeURIComponent(q)}`, { method: 'GET' });
                if (!res.ok) throw new Error('検索失敗');
                const results = await res.json();
                if (globalSearchResults) {
                    globalSearchResults.innerHTML = '';
                    results.forEach(r => {
                        const item = document.createElement('div');
                        item.className = 'p-1 hover:bg-teal-50 cursor-pointer';
                        item.textContent = `${r.content.slice(0,40)}...`;
                        item.addEventListener('click', () => {
                            handleSessionSelection(r.session_id).then(() => highlightMessage(r.message_id));
                            globalSearchResults.innerHTML='';
                        });
                        globalSearchResults.appendChild(item);
                    });
                }
            } catch (e) {
                console.error('検索エラー', e);
            }
        });
    }

    if (bulkSendBtn) {
        bulkSendBtn.addEventListener('click', async () => {
            const promptValue = promptTextarea.value.trim();
            if (!promptValue) { alert('プロンプトを入力してください。'); return; }
            if (!getToken()) { alert('この機能を利用するにはログインが必要です。'); return; }
            await openBulkSendModal(promptValue);
        });
    }

    let bulkPromptValue = '';
    async function populateBulkSendSessions() {
        if (!bulkSendSessionList) return;
        bulkSendSessionList.innerHTML = '<p class="text-xs text-gray-500">読込中...</p>';
        try {
            const res = await makeAuthenticatedRequest(API_ENDPOINT_CHAT_SESSIONS, { method: 'GET' });
            if (!res.ok) throw new Error('取得失敗');
            const sessions = await res.json();
            bulkSendSessionList.innerHTML = '';
            sessions.forEach(s => {
                const label = document.createElement('label');
                label.className = 'flex items-center space-x-1 mb-1';
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.value = s.id;
                const span = document.createElement('span');
                span.textContent = s.title || `セッション ${s.id}`;
                label.appendChild(cb);
                label.appendChild(span);
                bulkSendSessionList.appendChild(label);
            });
        } catch (e) {
            console.error(e);
            bulkSendSessionList.innerHTML = '<p class="text-xs text-red-500">取得失敗</p>';
        }
    }

    function updateBulkNewChatOptions() {
        if (!bulkNewChatOptions) return;
        const count = parseInt(bulkNewChatCount.value || '0');
        bulkNewChatOptions.innerHTML = '';
        for (let i = 0; i < count; i++) {
            const row = document.createElement('div');
            row.className = 'flex items-center space-x-1';
            const input = document.createElement('input');
            input.type = 'text';
            input.placeholder = `タイトル${i + 1}`;
            input.className = 'flex-grow p-1 border rounded text-xs';
            const select = document.createElement('select');
            select.className = 'p-1 border rounded text-xs';
            select.innerHTML = '<option value="">未分類</option>';
            foldersCache.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.id;
                opt.textContent = f.name;
                select.appendChild(opt);
            });
            row.appendChild(input);
            row.appendChild(select);
            bulkNewChatOptions.appendChild(row);
        }
    }

    async function openBulkSendModal(promptValue) {
        bulkPromptValue = promptValue;
        await populateBulkSendSessions();
        if (bulkNewChatCount) bulkNewChatCount.value = '0';
        updateBulkNewChatOptions();
        if (bulkSendModal) bulkSendModal.classList.remove('hidden');
    }

    if (bulkNewChatCount) bulkNewChatCount.addEventListener('change', updateBulkNewChatOptions);
    if (bulkSendCancel) bulkSendCancel.addEventListener('click', () => { if(bulkSendModal) bulkSendModal.classList.add('hidden'); });
    if (bulkSendExecute) bulkSendExecute.addEventListener('click', async () => {
        const selectedIds = Array.from(bulkSendSessionList.querySelectorAll('input[type="checkbox"]:checked')).map(cb => parseInt(cb.value));
        for (const sid of selectedIds) {
            try {
                const bodyData = { prompt: bulkPromptValue, mode: aiModeSelect.value, session_id: sid };
                if (aiModeSelect.value === 'longwriting') {
                    bodyData.char_count = parseInt(charCountInput.value || '0');
                }
                await makeAuthenticatedRequest(API_ENDPOINT_COLLABORATIVE_ANSWER, {
                    method: 'POST',
                    body: JSON.stringify(bodyData)
                });
            } catch (e) { console.error('一括送信エラー', e); }
        }
        const count = parseInt(bulkNewChatCount.value || '0');
        const inputs = bulkNewChatOptions.querySelectorAll('input');
        const selects = bulkNewChatOptions.querySelectorAll('select');
        for (let i = 0; i < count; i++) {
            let newId = null;
            const title = inputs[i].value || `新規チャット${i + 1}`;
            try {
                const res = await makeAuthenticatedRequest(API_ENDPOINT_CHAT_SESSIONS, {
                    method: 'POST',
                    body: JSON.stringify({ title })
                });
                if (res.ok) { const data = await res.json(); newId = data.id; }
            } catch (e) { console.error('新規チャット作成エラー', e); }
            const fid = selects[i].value;
            if (newId && fid) await moveSessionToFolder(newId, parseInt(fid));
            if (newId) {
                try {
                    const bodyDataNew = { prompt: bulkPromptValue, mode: aiModeSelect.value, session_id: newId };
                    if (aiModeSelect.value === 'longwriting') {
                        bodyDataNew.char_count = parseInt(charCountInput.value || '0');
                    }
                    await makeAuthenticatedRequest(API_ENDPOINT_COLLABORATIVE_ANSWER, {
                        method: 'POST',
                        body: JSON.stringify(bodyDataNew)
                    });
                } catch (e) { console.error('一括送信エラー', e); }
            }
        }
        if (bulkSendModal) bulkSendModal.classList.add('hidden');
        alert('送信しました');
        await loadChatSessions();
    });

    if (cloneSessionBtn) {
        cloneSessionBtn.addEventListener('click', async () => {
            if (!currentSessionId) { alert('複製するチャットを選択してください'); return; }
            const title = prompt('新しいチャットタイトル', '');
            const folderId = prompt('フォルダID (空で未分類)', '');
            try {
                const res = await makeAuthenticatedRequest(`${API_BASE_URL}/chat/sessions/${currentSessionId}/clone`, {
                    method: 'POST',
                    body: JSON.stringify({ title: title || null, folder_id: folderId ? parseInt(folderId) : null })
                });
                if (res.ok) { await loadChatSessions(); alert('引き継ぎました'); }
            } catch (e) { console.error('引き継ぎエラー', e); }
        });
    }

    if (chatSearchInput) {

    // --- チャットセッション一覧表示関連 ---
    async function loadChatSessions() {
        if (!getToken()) {
            if (chatSessionListDiv) chatSessionListDiv.innerHTML = '<p class="text-xs text-gray-500 px-2">ログインしてください</p>';
            return;
        }
        if (!chatSessionListDiv) return;
        chatSessionListDiv.innerHTML = '<p class="text-xs text-gray-500 px-2">履歴読込中...</p>'; // 読込中メッセージ

        try {
            const response = await makeAuthenticatedRequest(API_ENDPOINT_CHAT_SESSIONS, { method: 'GET' });
            if (!response.ok) {
                const err = await response.json().catch(() => ({ detail: 'セッション一覧の取得失敗' }));
                throw new Error(err.detail);
            }
            let sessions = await response.json();
            chatSessionListDiv.innerHTML = '';

            if (currentFolderId === -1) {
                sessions = sessions.filter(s => !s.folder_id);
            } else if (currentFolderId > 0) {
                sessions = sessions.filter(s => s.folder_id === currentFolderId);
            }

            if (sessions && sessions.length > 0) {
                sessions.sort((a, b) => new Date(b.updated_at || b.created_at) - new Date(a.updated_at || a.created_at));

                sessions.forEach(session => {
                    const sessionElementContainer = document.createElement('div'); // ★★★ 各セッションのコンテナ ★★★
                    sessionElementContainer.className = 'session-element flex items-center w-full hover:bg-teal-50 rounded-md group';
                    sessionElementContainer.setAttribute('data-session-id', session.id);
                    sessionElementContainer.setAttribute('data-status', session.status || 'complete');

                    sessionElementContainer.draggable = true;
                    sessionElementContainer.addEventListener('dragstart', (e) => {
                        e.dataTransfer.setData('text/plain', session.id);
                        sessionElementContainer.classList.add('dragging');
                    });
                    sessionElementContainer.addEventListener('dragend', () => {
                        sessionElementContainer.classList.remove('dragging');
                    });

                    const sessionButton = document.createElement('button');
                    sessionButton.className = 'flex items-center flex-grow px-3 py-2 text-xs text-left text-gray-700 focus:outline-none transition-colors duration-150 ease-in-out';
                    if (session.id === currentSessionId) {
                        sessionButton.classList.add('session-button-active');
                    }

                    const titleText = session.title ? (session.title.length > 15 ? session.title.substring(0, 12) + '...' : session.title) : `セッション ${session.id}`;
                    const updatedAt = new Date(session.updated_at || session.created_at); // updated_at がなければ created_at
                    const formattedDate = `${updatedAt.toLocaleDateString('ja-JP', { month: '2-digit', day: '2-digit' })} ${updatedAt.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' })}`;

                    sessionButton.innerHTML = `
                        <span class="session-title-text flex-grow" title="${session.title || ''}">${titleText}</span>
                        <span class="text-xs text-gray-400 flex-shrink-0 ml-1">${formattedDate}</span>
                    `;
                    if (session.status && session.status !== 'complete') {
                        const sp = document.createElement('span');
                        sp.className = 'session-loading-spinner';
                        sessionButton.appendChild(sp);
                    }
                    sessionButton.addEventListener('click', () => handleSessionSelection(session.id));

                    // アクションボタンコンテナ
                    const actionsDiv = document.createElement('div');
                    actionsDiv.className = 'session-button-actions flex items-center pr-2'; // 通常は非表示、ホバーで表示はCSSで

                    // 編集ボタン
                    const editBtn = document.createElement('button');
                    editBtn.className = 'edit-session-title-btn action-button text-gray-500 hover:text-blue-600';
                    editBtn.innerHTML = '✏️';
                    editBtn.title = "タイトル編集";
                    editBtn.dataset.sessionId = session.id;
                    editBtn.addEventListener('click', (e) => {
                        e.stopPropagation(); // 親のセッション選択イベントを発火させない
                        handleEditTitle(session.id, session.title);
                    });

                    // 削除ボタン
                    const deleteBtn = document.createElement("button");
                    deleteBtn.className = "delete-session-btn action-button text-gray-500 hover:text-red-600 delete";
                    deleteBtn.innerHTML = "🗑";
                    deleteBtn.title = "削除";
                    deleteBtn.dataset.sessionId = session.id;
                    deleteBtn.addEventListener("click", (e) => {
                        e.stopPropagation();
                        handleDeleteSession(session.id, session.title);
                    });

                    const moveBtn = document.createElement("button");
                    moveBtn.className = "move-session-btn action-button text-gray-500 hover:text-teal-600";
                    moveBtn.innerHTML = "📂";
                    moveBtn.title = "フォルダ移動";
                    moveBtn.addEventListener("click", (e) => {
                        e.stopPropagation();
                        handleMoveSession(session.id, session.folder_id);
                    });


                    actionsDiv.appendChild(editBtn);
                    actionsDiv.appendChild(deleteBtn);
                    actionsDiv.appendChild(moveBtn);

                    sessionElementContainer.appendChild(sessionButton);
                    sessionElementContainer.appendChild(actionsDiv);
                    chatSessionListDiv.appendChild(sessionElementContainer);
                });
            } else {
                chatSessionListDiv.innerHTML = '<p class="text-xs text-gray-500 px-2">チャット一覧はありません。</p>';
            }
        } catch (error) {
            console.error("セッション一覧読込エラー:", error);
            if (error.message !== 'auth' && chatSessionListDiv) {
                chatSessionListDiv.innerHTML = `<p class="text-xs text-red-500 px-2">履歴の読み込みに失敗しました。</p>`;
            }
        }
    }

async function handleSessionSelection(sessionId, suppressMessages = false) {
        hideThinkingVideo();
        if (loadingIndicator) loadingIndicator.classList.add('hidden');
        // セッションIDが数値でない場合は処理中断 (予期せぬ動作を防ぐ)
        if (isNaN(parseInt(sessionId))) {
            console.warn("無効なセッションIDが選択されました:", sessionId);
            return;
        }
        sessionId = parseInt(sessionId); // 数値に変換

        if (sessionId < 0) { // 仮セッションはサーバー問い合わせを行わない
            currentSessionId = sessionId;
            if (chatMessagesContainer) chatMessagesContainer.innerHTML = '';
            const allSessionElements = chatSessionListDiv.querySelectorAll('.session-element > button');
            allSessionElements.forEach(btn => btn.classList.remove('session-button-active'));
            const newlySelectedButton = chatSessionListDiv.querySelector(`.session-element[data-session-id="${sessionId}"] > button`);
            if (newlySelectedButton) newlySelectedButton.classList.add('session-button-active');
            return;
        }

        // 既に選択されているセッションで、かつメッセージが表示されていれば何もしない
        if (currentSessionId === sessionId && chatMessagesContainer.childElementCount > 1 && !chatMessagesContainer.innerHTML.includes('読込中...')) {
            return;
        }

        const allSessionElements = chatSessionListDiv.querySelectorAll('.session-element > button');
        allSessionElements.forEach(btn => btn.classList.remove('session-button-active'));

        const newlySelectedButton = chatSessionListDiv.querySelector(`.session-element[data-session-id="${sessionId}"] > button`);
        if (newlySelectedButton) {
            newlySelectedButton.classList.add('session-button-active');
        }

        const statusContainer = chatSessionListDiv.querySelector(`.session-element[data-session-id="${sessionId}"]`);
        if (!suppressMessages && statusContainer && statusContainer.dataset.status && statusContainer.dataset.status !== 'complete') {
            if (chatMessagesContainer) chatMessagesContainer.innerHTML = '';
            displayMessage('回答生成中...', 'system');
            if (loadingIndicator) loadingIndicator.classList.remove('hidden');
            showThinkingVideo();
        }


        currentSessionId = sessionId;
        if (chatMessagesContainer) chatMessagesContainer.innerHTML = ''; // メッセージ表示エリアをクリア
        if (!suppressMessages) displayMessage(`セッション ${sessionId} のメッセージを読込中...`, 'system');

        try {
            // routers/chat.py の get_chat_session_messages を呼び出す
            const response = await makeAuthenticatedRequest(`${API_ENDPOINT_CHAT_SESSIONS}/${sessionId}/messages`, { method: 'GET' });
            if (!response.ok) {
                const err = await response.json().catch(() => ({ detail: `メッセージの取得に失敗しました (セッションID: ${sessionId})` }));
                throw new Error(err.detail);
            }
            const messages = await response.json();
            if (chatMessagesContainer) chatMessagesContainer.innerHTML = ''; // 再度クリア

            if (messages && messages.length > 0) {
                messages.forEach(msg => displayMessage(msg.content, msg.role, msg.ai_model, msg.id));
            } else if (!suppressMessages) {
                displayMessage(`この会話にはまだメッセージがありません。`, 'system');
            }
        } catch (error) {
            console.error(`メッセージ読込エラー (SessionID: ${sessionId}):`, error);
            if (chatMessagesContainer) chatMessagesContainer.innerHTML = ''; // エラー時もクリア
            if (error.message !== 'auth') {
                displayMessage(`メッセージの読み込みに失敗しました: ${error.message}`, 'system');
            }
        }
    }

    async function ensureSessionReady() {
        if (currentSessionId !== null && currentSessionId < 0 && pendingSessionPromises[currentSessionId]) {

                currentSessionId = newId;
            } else {
