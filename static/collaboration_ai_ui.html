    // --- イベントリスナーと関連処理 (ログイン、登録、ログアウトなど) ---
    if (loginButton) {
        loginButton.addEventListener('click', async () => {
            const email = loginEmailInput.value; const password = loginPasswordInput.value;
            if (!email || !password) { alert('メールアドレスまたはユーザー名とパスワードを入力してください。'); return; }
            try {
                const formData = new FormData(); // FastAPIのOAuth2PasswordRequestFormはFormDataを期待
                formData.append('username', email); // FastAPIのOAuth2PasswordRequestFormは'username'キーを期待
                formData.append('password', password);
                // Content-Type は fetch が FormData の場合自動設定するので不要
                const response = await fetch(API_ENDPOINT_LOGIN, { method: 'POST', body: formData });
                if (!response.ok) {
                    const err = await response.json().catch(()=>({detail:'ログインに失敗しました。メールアドレスまたはパスワードを確認してください。'}));
                    throw new Error(err.detail);
                }
                const tokenData = await response.json();
                saveToken(tokenData.access_token);
                await fetchCurrentUserAndSetupUI(); // ログイン成功後にUI更新とセッション読み込み
            } catch (error) {
                console.error('ログインエラー:', error);
                alert(error.message);
            }
        });
    }
    if (registerButton) {
        registerButton.addEventListener('click', () => {
            const username = registerUsernameInput.value;
            const email = registerEmailInput.value;
            const password = registerPasswordInput.value;
            const gender = Array.from(genderInputs).find(r => r.checked)?.value;
            const color1 = color1Input.value;
            const color2 = color2Input.value;
            if (!username || username.length < 4 || username.length > 20) { alert('ユーザー名は4〜20文字で入力してください'); return; }
            if (!email || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) { alert('正しいメールアドレスを入力してください'); return; }
            if (!password || password.length < 8) { alert('パスワードは8文字以上で入力してください'); return; }
            if (!gender) { alert('性別を選択してください'); return; }
            sessionStorage.setItem('pendingRegistration', JSON.stringify({ username, email, password, gender, color1, color2 }));
            window.location.href = 'register_progress.html';
        });
    }

    if (logoutButton) { logoutButton.addEventListener('click', handleLogout); }
    function handleLogout() { removeToken(); updateUIAfterLogout(); }

    if (showRegisterLink) { showRegisterLink.addEventListener('click', (e) => { e.preventDefault(); toggleForms(true); }); }
    if (showLoginLink) { showLoginLink.addEventListener('click', (e) => { e.preventDefault(); toggleForms(false); }); }

    async function fetchCurrentUserAndSetupUI() {
        const token = getToken();
        if (!token) {
            updateUIAfterLogout();
            return;
        }
        try {
            const response = await makeAuthenticatedRequest(API_ENDPOINT_USERS_ME, { method: 'GET' });
            if (!response.ok) { // makeAuthenticatedRequest内で401は処理されるが、念のため
                throw new Error('ユーザー情報の取得に失敗しました。');
            }
            const userData = await response.json();
            updateUIAfterLogin(userData);
        } catch (error) {
            console.warn(error.message); // トークン切れなどの場合
            handleLogout(); // ユーザー情報取得失敗時はログアウト扱い
        }
    }
    
    // --- プロンプト送信処理 ---
    if (submitBtn) {
        submitBtn.addEventListener('click', async () => {
            const promptValue = promptTextarea.value.trim();
            let sendPrompt = promptValue;
            if (languageModeCheckbox && languageModeCheckbox.checked) {
                try {
                    const trRes = await makeAuthenticatedRequest(API_ENDPOINT_TRANSLATE, {
                        method: 'POST',
                        body: JSON.stringify({ text: promptValue, target_lang: 'EN' })
                    });
                    if (trRes.ok) { const d = await trRes.json(); sendPrompt = d.translated_text; }
                } catch (e) { console.error('翻訳失敗', e); }
            }
            if (!promptValue) { alert('プロンプトを入力してください。'); return; }
            if (!getToken()) { alert('チャット機能を利用するにはログインが必要です。'); return; }

            const selectedMode = aiModeSelect.value;
            displayMessage(promptValue, 'user'); // ユーザーのメッセージを先に表示
            promptTextarea.value = ''; // 入力欄をクリア

            await ensureSessionReady();

            if (currentSessionId === null) {
                try {
                    const provisional = promptValue.split(/\n/)[0].substring(0, 20) || '新しいチャット';
                    const createRes = await makeAuthenticatedRequest(API_ENDPOINT_CHAT_SESSIONS, {
                        method: 'POST',
                        body: JSON.stringify({ title: provisional, status: 'loading' })
                    });
                    if (createRes.ok) {
                        const newS = await createRes.json();
                        currentSessionId = newS.id;
                        await loadChatSessions();
                    }
                } catch(e) { console.error('session create error', e); }
            }

            const requestSessionId = currentSessionId;
            const targetKey = requestSessionId !== null ? String(requestSessionId) : 'new';
            if (sessionLoading[targetKey]) { alert('このチャットは応答待ちです。'); return; }
            sessionLoading[targetKey] = true;
            const container = document.querySelector(`.session-element[data-session-id="${requestSessionId}"]`);
            if (container) {
                container.dataset.status = 'loading';
                if (!container.querySelector('.session-loading-spinner')) {
                    const sp = document.createElement('span');
                    sp.className = 'session-loading-spinner';
                    container.querySelector('button').appendChild(sp);
                }
            }
            if (currentSessionId === requestSessionId && requestSessionId !== null) {
                loadingIndicator.classList.remove('hidden');
                showThinkingVideo();
            }

            try {
                let response;
                if (selectedMode === 'imagegen') {
                    const count = parseInt(imageCountSelect.value || '1');
                    const selectedImageApi = imageApiSelect.value; // 追加
                    response = await makeAuthenticatedRequest(API_ENDPOINT_IMAGE_GEN, {
                        method: 'POST',
                        body: JSON.stringify({ prompt: sendPrompt, count: count, api: selectedImageApi }) // api パラメータを追加
                    });
                } else {
                    const requestBody = {
                        prompt: sendPrompt,
                        mode: selectedMode,
                        session_id: currentSessionId
                    };
                    if (selectedMode === 'longwriting') {
                        requestBody.char_count = parseInt(charCountInput.value || '0');
                    }
                    response = await makeAuthenticatedRequest(API_ENDPOINT_COLLABORATIVE_ANSWER, {
                        method: 'POST',
                        body: JSON.stringify(requestBody)
                    });
                }

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ detail: `サーバーエラーが発生しました (${response.status})` }));
                    throw new Error(errorData.detail || `サーバーエラー (${response.status})`);
                }
                const data = await response.json();
                if (selectedMode === 'imagegen') {
                    console.log('image data:', data);
                    if (data.urls && data.urls.length > 0) {
                        const imgs = data.urls.map(u => `<img src="${u}" class="max-w-xs mr-2 mb-2">`).join('');
                        if (currentSessionId === requestSessionId) displayMessage(imgs, 'ai', 'Image');
                    } else {
                        if (currentSessionId === requestSessionId) displayMessage(data.error || '画像生成に失敗しました', 'ai', 'AIError');
                    }
                } else {
                    console.log("サーバーからの応答 (/collaborative_answer_v2):", data); // デバッグ用

                    if (data.overall_error) {
                        if (currentSessionId === requestSessionId) displayMessage(`全体エラー: ${data.overall_error}`, 'ai', 'SystemError');
                    } else if (data.search_mode_details && data.search_mode_details.length > 0) {
                        const fragments = data.search_mode_details.filter(i => i.source !== 'Search Summary (Gemini)');
                        const summaryItem = data.search_mode_details.find(i => i.source === 'Search Summary (Gemini)');
                        if (fragments.length > 0) {
                            if (currentSessionId === requestSessionId) displayMessage('<h3>断片情報一覧</h3>', 'system');
                            fragments.forEach((item) => {
                                let header = `<strong>${item.source}</strong>`;
                                if (item.query) header += `<br>クエリ: ${item.query}`;
                                if (item.intent) header += `<br>観点: ${item.intent}`;
                                if (item.response) {
                                    let body = `${header}<br>${item.response}`;
                                    if (item.links && item.links.length > 0) {
                                        const linksHtml = item.links.map(l => `<a href="${l}" target="_blank" class="text-blue-600 underline break-all">${l}</a>`).join('<br>');
                                        body += `<br><div class="mt-2 p-2 bg-gray-50 rounded">${linksHtml}</div>`;
                                    }
                                    if (currentSessionId === requestSessionId) displayMessage(body, 'ai', item.source);
                                } else if (item.error) {
                                    if (currentSessionId === requestSessionId) displayMessage(`エラー (${item.source}): ${item.error}`, 'ai', 'AIError');
                                }
                            });
                        }
                        if (summaryItem) {
                            if (currentSessionId === requestSessionId) displayMessage('<h3>まとめ</h3>', 'system');
                            let header = `<strong>${summaryItem.source}</strong>`;
                            if (summaryItem.query) header += `<br>クエリ: ${summaryItem.query}`;
                            if (summaryItem.intent) header += `<br>観点: ${summaryItem.intent}`;
                            if (summaryItem.response) {
                                let body = `${header}<br>${summaryItem.response}`;
                                if (summaryItem.links && summaryItem.links.length > 0) {
                                    const linksHtml = summaryItem.links.map(l => `<a href="${l}" target="_blank" class="text-blue-600 underline break-all">${l}</a>`).join('<br>');
                                    body += `<br><div class="mt-2 p-2 bg-gray-50 rounded">${linksHtml}</div>`;
                                }
                                if (currentSessionId === requestSessionId) displayMessage(body, 'ai', summaryItem.source);
                            } else if (summaryItem.error) {
                                if (currentSessionId === requestSessionId) displayMessage(`エラー (${summaryItem.source}): ${summaryItem.error}`, 'ai', 'AIError');
                            }
                        }
                    } else if (data.step7_final_answer_v2_openai && data.step7_final_answer_v2_openai.response) {
                        if (currentSessionId === requestSessionId) displayMessage(data.step7_final_answer_v2_openai.response, 'ai', data.step7_final_answer_v2_openai.source || 'AI');
                    } else if (data.step7_final_answer_v2_openai && data.step7_final_answer_v2_openai.error) {
                    if (currentSessionId === requestSessionId) displayMessage(`エラー (${data.step7_final_answer_v2_openai.source || 'AI'}): ${data.step7_final_answer_v2_openai.error}`, 'ai', 'AIError');
                } else {
                    if (currentSessionId === requestSessionId) displayMessage('AIから有効な応答がありませんでした。レスポンスデータを確認してください。', 'ai', 'System');
                }
                    // セッションIDの更新とリスト再読み込み
                    if (data.processed_session_id && currentSessionId !== data.processed_session_id) {
                        currentSessionId = data.processed_session_id;
                        console.log("新しいチャットセッションIDが設定されました:", currentSessionId);
                        await loadChatSessions();
                        const allSessionElements = chatSessionListDiv.querySelectorAll('.session-element > button');
                        allSessionElements.forEach(btn => btn.classList.remove('session-button-active'));
                        const newlyActiveButton = chatSessionListDiv.querySelector(`.session-element[data-session-id="${currentSessionId}"] > button`);
                        if (newlyActiveButton) newlyActiveButton.classList.add('session-button-active');
                    } else if (currentSessionId) {
                        await loadChatSessions();
                    } else if (!currentSessionId && data.processed_session_id) {
                        currentSessionId = data.processed_session_id;
                        await loadChatSessions();
                    }
                }


            } catch (error) {
                console.error('リクエストエラー:', error);
                displayMessage(`リクエスト処理中にエラーが発生しました: ${error.message}`, 'ai', 'SystemError');
            } finally {
                sessionLoading[targetKey] = false;
                const c = document.querySelector(`.session-element[data-session-id="${requestSessionId}"]`);
                if (c) {
                    c.dataset.status = 'complete';
                    const sp = c.querySelector('.session-loading-spinner');
                    if (sp) sp.remove();
                }
                if (requestSessionId !== null && currentSessionId === requestSessionId) {
                    hideThinkingVideo();
                    loadingIndicator.classList.add('hidden');
                }
            }
        });
    }

    if (videoGenerateBtn) {
        videoGenerateBtn.addEventListener('click', async () => {
            const desc = videoDescription.value.trim();
            if (!desc) { alert('テキスト説明を入力してください。'); return; }
            if (!getToken()) { alert('この機能を利用するにはログインが必要です。'); return; }
            videoProgressBar.style.width = '0%';
            videoProgress.classList.remove('hidden');
            loadingIndicator.classList.remove('hidden');
            showThinkingVideo();
            try {
                videoProgressBar.style.width = '30%';
                const body = {
                    prompt: desc,
                    duration: parseInt(videoDuration.value || '10'),
                    resolution: videoResolution.value,
                    bgm: videoBgm.checked,
                    narration_lang: videoNarration.checked ? videoNarrationLang.value : '',
                    subtitles: videoSubtitles.checked
                };
                const res = await makeAuthenticatedRequest(API_ENDPOINT_VIDEO_GEN, {
                    method: 'POST',
                    body: JSON.stringify(body)
                });
                if (!res.ok) throw new Error('生成に失敗しました');
                videoProgressBar.style.width = '70%';
                const data = await res.json();
                if (data.video_url) {
                    videoPreview.src = data.video_url;
                    videoPreview.classList.remove('hidden');
                    videoDownloadLink.href = data.video_url;
                    videoDownloadLink.classList.remove('hidden');
                }
                videoProgressBar.style.width = '100%';
            } catch (e) {
                console.error('video generation error', e);
                videoProgressBar.style.width = '100%';
            } finally {
                hideThinkingVideo();
                loadingIndicator.classList.add('hidden');
            }
        });
    }

    if (talkSendBtn) {
        talkSendBtn.addEventListener('click', async () => {
            const mode = Array.from(talkInputModeRadios).find(r => r.checked)?.value || 'text';
            let text = talkInputText.value.trim();
            let audioUrl = null;
            if (mode === 'mic') {
                if (recordedChunks.length === 0) { alert('録音がありません'); return; }
                const blob = new Blob(recordedChunks, { type: 'audio/webm' });
                const fd = new FormData();
                fd.append('file', blob, 'recording.webm');
                const upRes = await makeAuthenticatedRequest(API_ENDPOINT_TALK_UPLOAD, { method: 'POST', body: fd });
                if (!upRes.ok) { alert('音声アップロード失敗'); return; }
                const upData = await upRes.json();
                audioUrl = upData.url;
                text = '';
                recordedChunks = [];
            }
            if (!text && !audioUrl) { alert('テキストを入力してください。'); return; }
            if (!getToken()) { alert('この機能を利用するにはログインが必要です。'); return; }
            if (text) displayMessage(text, 'user');
            talkInputText.value = '';
            loadingIndicator.classList.remove('hidden');
            showThinkingVideo();
            try {
                const body = {
                    text,
                    audio_url: audioUrl,
                    input_lang: talkInputLang.value,
                    target_lang: talkOutputLang.value,
                    session_id: currentSessionId
                };
                const res = await makeAuthenticatedRequest(API_ENDPOINT_TALK_GEN, {
                    method: 'POST',
                    body: JSON.stringify(body)
                });
                if (!res.ok) throw new Error('生成に失敗しました');
                const data = await res.json();
                if (data.video_url) {
                    talkVideo.src = data.video_url;
                    talkVideo.classList.remove('hidden');
                }
                if (data.subtitle) {
                    talkSubtitle.textContent = data.subtitle;
                }
                let aiHtml = '';
                if (data.video_url) aiHtml += `<video src="${data.video_url}" class="max-w-xs" controls></video>`;
                if (data.subtitle) aiHtml += `<div class="mt-1 text-sm">${data.subtitle}</div>`;
                displayMessage(aiHtml || '応答なし', 'ai', 'Talk');
                if (data.session_id && currentSessionId !== data.session_id) {
                    currentSessionId = data.session_id;
                    await loadChatSessions();
                } else if (currentSessionId) {
                    await loadChatSessions();
                }
            } catch (e) {
                console.error('talk mode error', e);
                displayMessage('トーク生成に失敗しました', 'ai', 'AIError');
            } finally {
                hideThinkingVideo();
                loadingIndicator.classList.add('hidden');
            }
        });
    }

    // --- 初期化処理 ---
    document.addEventListener('DOMContentLoaded', () => {
        const prefill = sessionStorage.getItem('prefillEmail');
        if (prefill && loginEmailInput) {
            loginEmailInput.value = prefill;
            sessionStorage.removeItem('prefillEmail');
        }
        if (typeof hljs !== 'undefined') { hljs.highlightAll(); }
        fetchCurrentUserAndSetupUI(); // ページ読み込み時にユーザー情報を確認・UIセットアップ
        loadFolders();
        populateLangSelect(talkInputLang);
        populateLangSelect(talkOutputLang);
        populateLangSelect(talkStartInputLang);
        populateLangSelect(talkStartOutputLang);
        updateTalkInputMode();
        toggleCharCountBox();

        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebarToggleLabel = document.getElementById('sidebarToggleLabel');

        function applySidebarState(collapsed) {
            if (collapsed) {
                sidebar.classList.add('collapsed');
                sidebarToggle.innerHTML = '&#9654;';
                if (sidebarToggleLabel) sidebarToggleLabel.textContent = 'Open';
            } else {
                sidebar.classList.remove('collapsed');
                sidebarToggle.innerHTML = '&#9664;';
                if (sidebarToggleLabel) sidebarToggleLabel.textContent = 'Close';
            }
        }

        let sidebarCollapsed = localStorage.getItem('sidebarCollapsed') === '1';
        applySidebarState(sidebarCollapsed);

        if (sidebarToggle) {
            sidebarToggle.addEventListener('click', () => {
                sidebarCollapsed = sidebar.classList.contains('collapsed');
                applySidebarState(!sidebarCollapsed);
                localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed') ? '1' : '0');
            });
        }

        window.addEventListener('resize', () => {
            if (window.innerWidth < 640) {
                applySidebarState(true);
            }
        });

        if (sidebarTopLink) {
            sidebarTopLink.addEventListener('click', (e) => {
                console.log('Topに戻るが押された');
                e.preventDefault();
                resetChatUI();
                chatSessionListDiv.scrollTo({ top: 0, behavior: 'smooth' });
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        if (newChatButton) {
            newChatButton.addEventListener('click', () => {
                console.log('新しい会話ボタンが押された');
                if (!getToken()) { alert('この機能を利用するにはログインが必要です。'); return; }
                resetChatUI();
            });
        }
        // Enterキーでの送信
        if(promptTextarea) {
            promptTextarea.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault(); // デフォルトの改行動作をキャンセル
                    submitBtn.click();    // 送信ボタンのクリックイベントを発火
                }
            });
        }

        async function loadMemory() {
            if (!getToken()) { memoryList.innerHTML = '<p class="text-xs text-gray-500">ログインしてください</p>'; return; }
            memoryList.innerHTML = '<p class="text-xs text-gray-500">読込中...</p>';
            try {
                const res = await makeAuthenticatedRequest(API_ENDPOINT_MEMORY, { method: 'GET' });
                if (!res.ok) throw new Error('取得失敗');
                const data = await res.json();
                memoryList.innerHTML = '';
                data.forEach(m => {
                    const div = document.createElement('div');
                    div.className = 'flex justify-between items-center border-b py-1';
                    const span = document.createElement('span');
                    span.textContent = m.title;
                    const del = document.createElement('button');
                    del.className = 'text-red-500 text-xs';
                    del.textContent = '削除';
                    del.addEventListener('click', async () => {
                        await makeAuthenticatedRequest(`${API_ENDPOINT_MEMORY}/${m.id}`, { method: 'DELETE' });
                        loadMemory();
                    });
                    div.appendChild(span);
                    div.appendChild(del);
                    memoryList.appendChild(div);
                });
            } catch (e) { memoryList.innerHTML = '<p class="text-xs text-red-500">読み込み失敗</p>'; }
        }

        if(memoryManageButton){
            memoryManageButton.addEventListener('click', () => { if(memoryModal) memoryModal.classList.remove('hidden'); loadMemory(); });
        }
        if(memoryClose){
            memoryClose.addEventListener('click', () => { if(memoryModal) memoryModal.classList.add('hidden'); });
        }
        if(addMemoryBtn){
            addMemoryBtn.addEventListener('click', async () => {
                const title = memoryTitleInput.value.trim();
                const content = memoryContentInput.value.trim();
                if(!title || !content) return;
                await makeAuthenticatedRequest(API_ENDPOINT_MEMORY, { method:'POST', body: JSON.stringify({ title, content }) });
                memoryTitleInput.value = '';
                memoryContentInput.value = '';
                loadMemory();
            });
        }

        async function loadTemplates() {
            if (!getToken()) { templateList.innerHTML = '<p class="text-xs text-gray-500">ログインしてください</p>'; return; }
            templateList.innerHTML = '<p class="text-xs text-gray-500">読込中...</p>';
            try {
                const res = await makeAuthenticatedRequest(API_ENDPOINT_TEMPLATES, { method: 'GET' });
                if (!res.ok) throw new Error('取得失敗');
                const data = await res.json();
                templateList.innerHTML = '';
                data.forEach(t => {
                    const div = document.createElement('div');
                    div.className = 'flex justify-between items-center border-b py-1';
                    const span = document.createElement('span');
                    span.textContent = t.title;
                    const actions = document.createElement('div');
                    const adopt = document.createElement('button');
                    adopt.className = 'text-teal-500 text-xs mr-1';
                    adopt.textContent = '採用';
                    adopt.addEventListener('click', () => {
                        if(promptTextarea) promptTextarea.value = t.content;
                        if(templateModal) templateModal.classList.add('hidden');
                        if(promptTextarea) promptTextarea.focus();
                    });
                    const del = document.createElement('button');
                    del.className = 'text-red-500 text-xs';
                    del.textContent = '削除';
                    del.addEventListener('click', async () => {
                        await makeAuthenticatedRequest(`${API_ENDPOINT_TEMPLATES}/${t.id}`, { method: 'DELETE' });
                        loadTemplates();
                    });
                    actions.appendChild(adopt);
                    actions.appendChild(del);
                    div.appendChild(span);
                    div.appendChild(actions);
                    templateList.appendChild(div);
                });
            } catch (e) { templateList.innerHTML = '<p class="text-xs text-red-500">読み込み失敗</p>'; }
        }

        if(templateBtn){
            templateBtn.addEventListener('click', () => { if(templateModal) templateModal.classList.remove('hidden'); loadTemplates(); });
        }
        if(templateClose){
            templateClose.addEventListener('click', () => { if(templateModal) templateModal.classList.add('hidden'); });
        }
        if(addTemplateBtn){
            addTemplateBtn.addEventListener('click', async () => {
                const title = templateTitleInput.value.trim();
                const content = templateContentInput.value.trim();
                const category = templateCategoryInput.value.trim();
                if(!title || !content) return;
                await makeAuthenticatedRequest(API_ENDPOINT_TEMPLATES, { method:'POST', body: JSON.stringify({ title, content, category }) });
                templateTitleInput.value = '';
                templateContentInput.value = '';
                templateCategoryInput.value = '';
                loadTemplates();
            });
        }
    });
</script>
</html>
